assemble:
    - from: .
      include:
          - package.json
          - server.js
      into: .
ecopulse-headless-auth:
    .serviceAddress: localhost:3002
    .serviceScheme: http
    name: EcoPulse Headless Auth
    scopes:
        - Liferay.Headless.Admin.User.everything
        - Liferay.Headless.Delivery.everything
    type: oAuthApplicationHeadlessServer
