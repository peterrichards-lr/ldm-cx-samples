assemble:
    - from: .
      include:
          - package.json
          - server.js
      into: .
ecopulse-object-action:
    .serviceAddress: localhost:3003
    .serviceScheme: http
    name: EcoPulse Object Action Node
    oAuth2ApplicationExternalReferenceCode: ecopulse-object-action-oahs
    resourcePath: /object-action
    type: objectAction
ecopulse-object-action-oahs:
    .serviceAddress: localhost:3003
    .serviceScheme: http
    name: EcoPulse Object Action OAuth Application
    scopes:
        - Liferay.Headless.Admin.User.everything
    type: oAuthApplicationHeadlessServer
