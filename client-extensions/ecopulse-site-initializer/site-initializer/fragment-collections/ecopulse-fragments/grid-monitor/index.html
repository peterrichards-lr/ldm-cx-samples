<div
	class="grid-monitor bg-white p-4 border border-navy rounded shadow-sm d-flex align-items-center gap-4"
>
	<div class="monitor-icon p-3 bg-navy-light rounded-circle">
		<svg
			viewBox="0 0 24 24"
			width="32"
			height="32"
			fill="none"
			stroke="#1A237E"
			stroke-width="2"
			stroke-linecap="round"
			stroke-linejoin="round"
		>
			<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
		</svg>
	</div>
	<div class="monitor-data flex-grow-1">
		<div class="d-flex justify-content-between align-items-end mb-2">
			<span
				class="text-muted small font-weight-bold text-uppercase"
				data-lfr-editable-id="label"
				data-lfr-editable-type="text"
			>
				GRID HEALTH
			</span>
			<span
				class="text-navy font-weight-bold h3 mb-0"
				data-lfr-editable-id="value"
				data-lfr-editable-type="text"
			>
				98.2%
			</span>
		</div>
		<div class="progress" style="height: 8px">
			<div
				class="progress-bar bg-emerald"
				role="progressbar"
				style="width: 98.2%"
				aria-valuenow="98.2"
				aria-valuemin="0"
				aria-valuemax="100"
			></div>
		</div>
		<p
			class="mb-0 mt-2 small text-muted italic"
			data-lfr-editable-id="status-note"
			data-lfr-editable-type="text"
		>
			Stable: Renewable sources providing 64% of load.
		</p>
	</div>
</div>
