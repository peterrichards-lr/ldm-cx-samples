sample-workflow-action-node:
    name: Sample Workflow Action Node
    oAuth2ApplicationExternalReferenceCode: sample-workflow-action-node-oauth-application
    resourcePath: /workflow-action
    type: workflowAction
sample-workflow-action-node-oauth-application:
    name: Sample Workflow Action Node OAuth Application
    scopes:
        - Liferay.Headless.Admin.User.everything
    type: oAuthApplicationHeadlessServer
