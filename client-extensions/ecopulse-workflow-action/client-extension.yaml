assemble:
    - from: .
      include:
        - package.json
        - server.js
      into: .
ecopulse-workflow-action:
    .serviceAddress: localhost:3004
    .serviceScheme: http
    name: EcoPulse Workflow Action Node
    oAuth2ApplicationExternalReferenceCode: ecopulse-workflow-action-oahs
    resourcePath: /workflow-action
    type: workflowAction
ecopulse-workflow-action-oahs:
    .serviceAddress: localhost:3004
    .serviceScheme: http
    name: EcoPulse Workflow Action OAuth Application
    scopes:
        - Liferay.Headless.Admin.User.everything
    type: oAuthApplicationHeadlessServer
