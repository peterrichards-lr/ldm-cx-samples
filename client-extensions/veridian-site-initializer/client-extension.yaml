veridian-site-initializer:
    name: Veridian Site Initializer
    oAuthApplicationHeadlessServer: veridian-site-initializer-oahs
    siteExternalReferenceCode: L_GUEST
    siteName: Guest
    type: siteInitializer
veridian-site-initializer-oahs:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Veridian Site Initializer OAuth Application Headless Server
    scopes:
        - Liferay.Headless.Site.everything
    type: oAuthApplicationHeadlessServer
